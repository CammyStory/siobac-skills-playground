name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One workflow for the whole bundle: each skill is built and smoke-tested
# from its own folder across the full OS × Node matrix.
jobs:
  build:
    name: ${{ matrix.skill }} · node ${{ matrix.node }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        skill: [ovoclaw-share]
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: skills/${{ matrix.skill }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dev dependencies
        run: npm install

      - name: Type-check + build
        run: npm run build

      - name: Smoke test — help
        run: node dist/cli.js --help

      - name: Smoke test — unknown subcommand exits non-zero
        shell: bash
        run: |
          if node dist/cli.js __not_a_real_command__; then
            echo "Expected non-zero exit, got success" >&2
            exit 1
          fi

      - name: Confirm dist/ is in sync with src/
        shell: bash
        run: |
          rm -rf dist
          npm run build
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ for ${{ matrix.skill }} is out of date. Run 'npm run build' in skills/${{ matrix.skill }} and commit." >&2
            git --no-pager diff --stat dist/
            exit 1
          fi
